version: "3.9"

networks:
  orion-net:
    driver: bridge

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
  orion_postgres_data:

services:

  # ── TIER 1: ALWAYS ON ──────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: orion-redis
    restart: unless-stopped
    command: redis-server --maxmemory 200mb --maxmemory-policy allkeys-lru --save ""
    networks: [orion-net]
    ports: ["6379:6379"]
    volumes: [redis_data:/data]
    deploy:
      resources:
        limits:
          memory: 220M

  news-scraper:
    image: node:18-alpine
    container_name: orion-news-scraper
    restart: unless-stopped
    working_dir: /app
    volumes: [./services/news-scraper:/app]
    command: sh -c "npm install --silent && node src/index.js"
    environment:
      - REDIS_URL=redis://orion-redis:6379
      - SCRAPE_INTERVAL_MS=${SCRAPE_INTERVAL_MS:-300000}
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=150
    depends_on: [redis]
    networks: [orion-net]
    ports: ["3030:3030"]
    deploy:
      resources:
        limits:
          memory: 180M

  translator:
    image: node:18-alpine
    container_name: orion-translator
    restart: unless-stopped
    working_dir: /app
    volumes: [./services/translator:/app]
    command: sh -c "npm install --silent && node src/index.js"
    environment:
      - REDIS_URL=redis://orion-redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TRANSLATE_BATCH_SIZE=${TRANSLATE_BATCH_SIZE:-10}
      - NODE_OPTIONS=--max-old-space-size=100
    depends_on: [redis, news-scraper]
    networks: [orion-net]
    ports: ["3031:3031"]
    deploy:
      resources:
        limits:
          memory: 120M

  prometheus:
    image: prom/prometheus:latest
    container_name: orion-prometheus
    restart: unless-stopped
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports: ["9090:9090"]
    networks: [orion-net]
    deploy:
      resources:
        limits:
          memory: 256M

  # ── TIER 2: INTELLIGENCE ───────────────────────────────────

  orion-postgres:
    image: postgres:15-alpine
    container_name: orion-postgres
    restart: unless-stopped
    profiles: [tier2, tier3]
    environment:
      POSTGRES_DB: orion
      POSTGRES_USER: orion
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orion_secure_2024}
    volumes: [orion_postgres_data:/var/lib/postgresql/data]
    ports: ["5434:5432"]
    networks: [orion-net]
    deploy:
      resources:
        limits:
          memory: 256M

  regime-engine:
    image: node:18-alpine
    container_name: orion-regime
    restart: unless-stopped
    profiles: [tier2, tier3]
    working_dir: /app
    volumes: [./services/regime-engine:/app]
    command: sh -c "npm install --silent && node src/index.js"
    environment:
      - REDIS_URL=redis://orion-redis:6379
      - PORT=3010
      - NODE_OPTIONS=--max-old-space-size=150
    depends_on: [redis]
    networks: [orion-net]
    ports: ["3010:3010"]
    deploy:
      resources:
        limits:
          memory: 180M

  anomaly-engine:
    image: node:18-alpine
    container_name: orion-anomaly
    restart: unless-stopped
    profiles: [tier2, tier3]
    working_dir: /app
    volumes: [./services/anomaly-engine:/app]
    command: sh -c "npm install --silent && node src/index.js"
    environment:
      - REDIS_URL=redis://orion-redis:6379
      - PORT=3015
      - NODE_OPTIONS=--max-old-space-size=100
    depends_on: [redis]
    networks: [orion-net]
    ports: ["3015:3015"]
    deploy:
      resources:
        limits:
          memory: 150M

  # ── TIER 3: FULL DEPTH ─────────────────────────────────────

  grafana:
    image: grafana/grafana:latest
    container_name: orion-grafana
    restart: unless-stopped
    profiles: [tier3]
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-orion2024}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/dashboards/orion-main.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infrastructure/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./infrastructure/grafana/dashboards:/etc/grafana/dashboards:ro
    ports: ["3001:3000"]
    depends_on: [prometheus]
    networks: [orion-net]
    deploy:
      resources:
        limits:
          memory: 256M

  world-model:
    image: node:18-alpine
    container_name: orion-world-model
    restart: unless-stopped
    profiles: [tier3]
    working_dir: /app
    volumes: [./services/world-modeling-service:/app]
    command: sh -c "npm install --silent && node src/index.js"
    environment:
      - REDIS_URL=redis://orion-redis:6379
      - PORT=3020
      - NODE_OPTIONS=--max-old-space-size=200
    depends_on: [redis, orion-postgres]
    networks: [orion-net]
    ports: ["3020:3020"]
    deploy:
      resources:
        limits:
          memory: 256M

  strategy-engine:
    image: node:18-alpine
    container_name: orion-strategy
    restart: unless-stopped
    profiles: [tier3]
    working_dir: /app
    volumes: [./services/strategy-engine:/app]
    command: sh -c "npm install --silent && node src/index.js"
    environment:
      - REDIS_URL=redis://orion-redis:6379
      - PORT=3014
      - NODE_OPTIONS=--max-old-space-size=150
    depends_on: [redis]
    networks: [orion-net]
    ports: ["3014:3014"]
    deploy:
      resources:
        limits:
          memory: 200M
